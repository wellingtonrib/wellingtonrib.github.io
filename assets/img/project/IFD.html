<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iFood</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #6B0D1B;
      color: #fff;
      overflow: hidden;
    }
    .showcase {
      display: flex;
      width: 100vw;
      height: 100vh;
      min-height: 500px;
    }
    .info-panel {
      width: 30%;
      background: #6B0D1B;
      padding: 60px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .info-panel h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1.2;
    }
    .info-panel p {
      font-size: 0.95rem;
      line-height: 1.6;
      opacity: 0.85;
    }
    .screenshots-panel {
      width: 70%;
      background: linear-gradient(135deg, #EA1D2C 0%, #B71C1C 50%, #C62828 100%);
      padding: 30px 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      overflow: hidden;
    }
    .screenshots-panel::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 500px;
      height: 500px;
      background: rgba(255,255,255,0.03);
      border-radius: 50%;
    }
    .app-logo {
      width: 80px;
      height: 80px;
      background: #e2e8f0;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 0.75rem;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      flex-shrink: 0;
      overflow: hidden;
    }
    .app-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 18px;
    }
    .devices {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .phone-frame {
      width: 220px;
      flex-shrink: 0;
      background: #1a1a2e;
      padding: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .phone-frame .screen {
      width: 100%;
      height: 400px;
      background: #e2e8f0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 0.85rem;
      text-align: center;
    }
    .phone-frame .screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="showcase">
    <div class="info-panel">
      <h1>iFood</h1>
      <p>
        Brazil's leading food delivery platform with 80%+ market share, active in over 1,000 cities.
        Connects millions of customers to 300,000+ restaurants, grocery stores, and pharmacies,
        processing over 100 million orders per month.
      </p>
    </div>
    <div class="screenshots-panel">
      <img src="ifood-logo.webp" width="80" height="80">
      <img src="ifood-banner.jpeg">
    </div>
  </div>
</body>
</html>
